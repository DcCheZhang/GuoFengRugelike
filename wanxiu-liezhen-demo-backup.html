function mkPU(dataId,tier){var d=findUD(dataId);if(!d)return null;var ti=TO.indexOf(tier);var mi=TO.indexOf(d.min);if(ti<mi)return null;var bs=d.t[tier];if(!bs)return null;var uid=nUID++;return{uid:uid,did:dataId,nm:d.nm,tp:d.tp,tier:tier,lv:1,hp:bs.hp,mhp:bs.hp,at:bs.at,df:bs.df,as:bs.as,ms:bs.ms,rg:bs.rg,cr:bs.cr,cd:bs.cd,dr:bs.dr,tg:bs.tg,alive:true,rcd:-1,arts:[],bx:0,by:0,acd:0,tgt:null,dd:0,dt:0,hd:0}}

function mkEU(dataId,dm){dm=dm||1;var d=findED(dataId);if(!d)return null;var uid=nUID++;return{uid:uid,did:dataId,nm:d.nm,ct:d.ct,hp:Math.round(d.hp*dm),mhp:Math.round(d.hp*dm),at:Math.round(d.at*dm),df:Math.round(d.df*dm),as:d.as,ms:d.ms,rg:d.rg,cr:d.cr,cd:d.cd,dr:d.dr,tg:d.tg,alive:true,rcd:-1,bx:0,by:0,acd:0,tgt:null,dd:0,dt:0,hd:0,tier:null,lv:1}}

function calcDmg(atk,def){if(Math.random()<def.dr)return{dmg:0,crit:false,dodge:true,kill:false};var ecr=Math.max(0,atk.cr-def.tg*0.01);var crit=Math.random()<ecr;var rf=0.9+Math.random()*0.2;var dmg=(atk.at-def.df*0.8)*1*rf;if(crit)dmg*=atk.cd;dmg=Math.max(1,Math.round(dmg));var ad=Math.min(dmg,def.hp);def.hp-=ad;var kill=def.hp<=0;if(kill)def.alive=false;return{dmg:ad,crit:crit,dodge:false,kill:kill}}

function genEnemies(round){var cy=Math.floor((round-1)/20)+1;var ri=(round-1)%20+1;var ci=Math.min(cy-1,8);var dm=getDiff(round);var rt=getRT(round);var pool=CEP[ci];var enemies=[];if(rt===RT.BOSS){var bid=CB[ci];var b=mkEU(bid,dm*1.5);if(b)enemies.push(b);var mc=10+Math.floor(ci/3);for(var i=0;i<mc;i++){var eid=R.pick(pool);var e=mkEU(eid,dm);if(e)enemies.push(e)}}else{var bc=5+Math.floor(ri/5);var ro=R.i(-1,2);var c=bc+ro;if(rt===RT.RELIC)c+=2;if(rt===RT.SHOP)c+=1;for(var i=0;i<c;i++){var eid=R.pick(pool);var e=mkEU(eid,dm);if(e)enemies.push(e)}}return enemies}

function mkArtInst(ad){return{id:ad.id,nm:ad.nm,tp:ad.tp,desc:ad.desc,q:ad.q,price:ad.price,iid:nUID++}}

function applyArt(art,unit){if(!art||!unit)return;var m={normal:1,scarce:2,legendary:4,mythical:8}[art.q]||1;if(art.tp==='进攻'){unit.at+=Math.round(5*m);unit.cr=Math.min(1,unit.cr+0.02*m)}else if(art.tp==='防御'){unit.df+=Math.round(3*m);unit.mhp+=Math.round(20*m);unit.hp=Math.min(unit.hp+Math.round(20*m),unit.mhp);unit.tg+=Math.round(2*m)}else if(art.tp==='功能'){unit.as=Math.max(0.1,unit.as-0.05*m);unit.ms+=Math.round(5*m)}}

function genShop(){var items=[];var au=UD.filter(function(d){return TO.indexOf(d.min)<=TO.indexOf('scarce')});for(var i=0;i<3;i++){var d=R.pick(au);var tr=R.w([{tier:'normal',weight:50},{tier:'scarce',weight:35},{tier:'legendary',weight:15}]);var ti=TO.indexOf(tr.tier);var mi=TO.indexOf(d.min);if(ti>=mi){items.push({tp:'unit',data:d,tier:tr.tier,price:{normal:100,scarce:300,legendary:1000}[tr.tier]||100})}}var aa=AD.filter(function(a){return a.q!=='mythical'});for(var i=0;i<3;i++){var a=R.pick(aa);items.push({tp:'artifact',data:a,price:a.price||300})}return items}

function processRevives(){for(var i=GS.dead.length-1;i>=0;i--){var u=GS.dead[i];u.rcd--;if(u.rcd<=0){u.alive=true;u.hp=Math.round(u.mhp*0.5);u.rcd=-1;GS.units.push(u);showToast(u.nm+' 复活，生命恢复50%');GS.dead.splice(i,1)}}}

init:function(pu,eu){this.pu=[];this.eu=[];var ch=GC.CH;for(var i=0;i<pu.length;i++){var u=Object.assign({},pu[i]);u.hp=pu[i].hp;u.mhp=pu[i].mhp;u.bx=80+R.i(0,40);u.by=60+(i/(pu.length||1))*(ch-120)+R.i(-15,15);u.acd=0;u.tgt=null;u.dd=0;u.dt=0;u.hd=0;u.alive=true;this.pu.push(u)}for(var i=0;i<eu.length;i++){var u=Object.assign({},eu[i]);u.bx=GC.CW-80-R.i(0,40);u.by=60+(i/(eu.length||1))*(ch-120)+R.i(-15,15);u.acd=0;u.tgt=null;u.dd=0;u.dt=0;u.hd=0;u.alive=true;this.eu.push(u)}this.fx=[];this.bt=0;this.over=false;this.res=null;this.running=false},

loop:function(){if(!this.running)return;var now=performance.now();var dt=(now-this.lt)/1000;this.lt=now;dt*=GS.bspeed;if(!GS.bpaused&&!this.over)this.update(dt);this.render();var self=this;this.af=requestAnimationFrame(function(){self.loop()})},
update:function(dt){this.bt+=dt;var all=this.pu.concat(this.eu);for(var i=0;i<all.length;i++){var u=all[i];if(!u.alive)continue;u.acd-=dt;if(u.acd<=0){var isP=this.pu.indexOf(u)>=0;var enemies=isP?this.eu:this.pu;var alive=[];for(var j=0;j<enemies.length;j++)if(enemies[j].alive)alive.push(enemies[j]);if(alive.length===0)continue;var tgt=null;if(u.rg>0){var best=null;for(var j=0;j<alive.length;j++){var e=alive[j];var d=Math.hypot(e.bx-u.bx,e.by-u.by);if(!best||d<best.d)best={u:e,d:d}}if(best)tgt=best.u}else{if(!u.tgt||!u.tgt.alive)u.tgt=R.pick(alive);tgt=u.tgt;if(tgt){var dx=tgt.bx-u.bx;var dy=tgt.by-u.by;var dist=Math.hypot(dx,dy);if(dist>40){u.bx+=(dx/dist)*u.ms*dt;u.by+=(dy/dist)*u.ms*dt;continue}}}if(tgt){var dist=Math.hypot(tgt.bx-u.bx,tgt.by-u.by);if(u.rg>0&&dist>u.rg+30){var dx=tgt.bx-u.bx;var dy=tgt.by-u.by;u.bx+=(dx/dist)*u.ms*dt;u.by+=(dy/dist)*u.ms*dt}else{var r=calcDmg(u,tgt);u.acd=u.as;if(r.dodge){this.fx.push({tp:'miss',x:tgt.bx,y:tgt.by-20,life:.8,ml:.8})}else{if(r.dmg>0){u.dd+=r.dmg;tgt.dt+=r.dmg;this.fx.push({tp:'dmg',x:tgt.bx+R.i(-10,10),y:tgt.by-20,v:r.dmg,c:r.crit,life:.8,ml:.8})}if(r.kill)this.fx.push({tp:'kill',x:tgt.bx,y:tgt.by,life:1,ml:1})}if(u.rg===0&&tgt.alive){var dx=tgt.bx-u.bx;var dy=tgt.by-u.by;var d=Math.hypot(dx,dy);if(d>40){u.bx+=(dx/d)*u.ms*dt*.5;u.by+=(dy/d)*u.ms*dt*.5}}}}}}for(var i=this.fx.length-1;i>=0;i--){this.fx[i].life-=dt;if(this.fx[i].life<=0)this.fx.splice(i,1)}var pa=0,ea=0;for(var i=0;i<this.pu.length;i++)if(this.pu[i].alive)pa++;for(var i=0;i<this.eu.length;i++)if(this.eu[i].alive)ea++;if(ea===0&&!this.over){this.over=true;this.res='win';EventBus.emit(GameEvent.BATTLE_END,{result:'win'})}else if(pa===0&&!this.over){this.over=true;this.res='lose';EventBus.emit(GameEvent.BATTLE_END,{result:'lose'})}},
render:function(){var canvas=document.getElementById('battle-canvas');var ctx=canvas.getContext('2d');var W=GC.CW,H=GC.CH;ctx.clearRect(0,0,W,H);var grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#0a0a1a');grad.addColorStop(1,'#1a1a3a');ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(212,165,116,0.15)';ctx.lineWidth=1;for(var x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(var y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}ctx.strokeStyle='rgba(196,30,58,0.3)';ctx.lineWidth=2;ctx.setLineDash([8,8]);ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);var self=this;function drawU(u,isP){if(!u.alive){ctx.globalAlpha=.3;ctx.fillStyle='#666';ctx.fillRect(u.bx-10,u.by-10,20,20);ctx.globalAlpha=1;return}var bc=isP?'#4ade80':'#c41e3a';var tc=u.tier?{normal:'#ccc',scarce:'#4ade80',legendary:'#a855f7',mythical:'#f97316'}[u.tier]||bc:bc;ctx.strokeStyle=tc;ctx.lineWidth=2;ctx.fillStyle=isP?'rgba(74,222,128,0.2)':'rgba(196,30,58,0.2)';ctx.beginPath();ctx.arc(u.bx,u.by,16,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle=tc;ctx.font='10px "Noto Serif SC"';ctx.textAlign='center';var dn=u.nm.length>2?u.nm.slice(0,2):u.nm;ctx.fillText(dn,u.bx,u.by+3);var hp=u.hp/u.mhp;var bw=24,bh=3;ctx.fillStyle='#333';ctx.fillRect(u.bx-bw/2,u.by-22,bw,bh);ctx.fillStyle=hp>.5?'#4ade80':hp>.25?'#fbbf24':'#c41e3a';ctx.fillRect(u.bx-bw/2,u.by-22,bw*hp,bh)}for(var i=0;i<this.pu.length;i++)drawU(this.pu[i],true);for(var i=0;i<this.eu.length;i++)drawU(this.eu[i],false);for(var i=0;i<this.fx.length;i++){var e=this.fx[i];var al=e.life/e.ml;ctx.globalAlpha=al;if(e.tp==='dmg'){ctx.fillStyle=e.c?'#f97316':'#fff';ctx.font=e.c?'bold 16px "Ma Shan Zheng"':'12px "Noto Serif SC"';ctx.textAlign='center';ctx.fillText((e.c?'暴击 ':'')+e.v,e.x,e.y-(1-al)*30)}else if(e.tp==='miss'){ctx.fillStyle='#aaa';ctx.font='14px "Ma Shan Zheng"';ctx.textAlign='center';ctx.fillText('MISS',e.x,e.y-(1-al)*20)}else el.addEventListener('click',function(){var key=this.dataset.fold;var children=document.querySelectorAll('[data-fold-child="'+key+'"]');var vis=children[0]&&children[0].style.display!=='none';children.forEach(function(c){c.style.display=vis?'none':'block'});var arrow=this.querySelector('div:last-child');if(arrow)arrow.textContent=vis?'▶':'▼'})});initCamp()}

function initCamp(){if(campAF)cancelAnimationFrame(campAF);campUnits=[];var zone=document.getElementById('camp-zone');if(!zone)return;var zw=zone.clientWidth||400;var zh=zone.clientHeight||220;var allUnits=GS.units.concat(GS.dead);var spacing=36;var cols=Math.floor((zw-20)/spacing);for(var i=0;i<allUnits.length;i++){var u=allUnits[i];var col=i%cols;var row=Math.floor(i/cols);campUnits.push({uid:u.uid,nm:u.nm,tier:u.tier,alive:u.alive,hp:u.hp,mhp:u.mhp,at:u.at,df:u.df,tp:u.tp,x:20+col*spacing+R.i(0,8),y:20+row*spacing+R.i(0,8),vx:u.alive?R.fl(-20,20):0,vy:u.alive?R.fl(-20,20):0})}renderCamp();updateCampLoop()}
function updateCampLoop(){var zone=document.getElementById('camp-zone');if(!zone){campAF=null;return}var zw=zone.clientWidth||400;var zh=zone.clientHeight||220;var pad=16;for(var i=0;i<campUnits.length;i++){var cu=campUnits[i];if(!cu.alive)continue;cu.x+=cu.vx*0.016;cu.y+=cu.vy*0.016;if(cu.x<pad){cu.x=pad;cu.vx=Math.abs(cu.vx)}if(cu.x>zw-pad-28){cu.x=zw-pad-28;cu.vx=-Math.abs(cu.vx)}if(cu.y<pad){cu.y=pad;cu.vy=Math.abs(cu.vy)}if(cu.y>zh-pad-28){cu.y=zh-pad-28;cu.vy=-Math.abs(cu.vy)}for(var j=i+1;j<campUnits.length;j++){var cu2=campUnits[j];var dx=cu.x-cu2.x;var dy=cu.y-cu2.y;var dist=Math.sqrt(dx*dx+dy*dy);if(dist<30&&dist>0){var nx=dx/dist;var ny=dy/dist;cu.vx+=nx*2;cu.vy+=ny*2;cu2.vx-=nx*2;cu2.vy-=ny*2}if(dist<26){var push=(26-dist)/2;cu.x+=nx*push;cu.y+=ny*push;cu2.x-=nx*push;cu2.y-=ny*push}}var spd=Math.sqrt(cu.vx*cu.vx+cu.vy*cu.vy);if(spd>30){cu.vx=cu.vx/spd*30;cu.vy=cu.vy/spd*30}if(Math.random()<0.01){cu.vx+=R.fl(-8,8);cu.vy+=R.fl(-8,8)}}renderCamp();var self=this;campAF=requestAnimationFrame(function(){updateCampLoop()})}
function renderCamp(){var zone=document.getElementById('camp-zone');if(!zone)return;var existing=zone.querySelectorAll('.camp-unit,.camp-decor,.camp-detail');existing.forEach(function(e){e.remove()});if(!zone.querySelector('.camp-decor-inner')){var d1=document.createElement('div');d1.className='camp-decor';d1.style.cssText='top:0;left:0;right:0;bottom:0;border:2px solid rgba(212,165,116,0.2);border-radius:10px;pointer-events:none';zone.appendChild(d1);var d2=document.createElement('div');d2.className='camp-decor';d2.style.cssText='top:8px;left:50%;transform:translateX(-50%);width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)';zone.appendChild(d2);var d3=document.createElement('div');d3.className='camp-decor';d3.style.cssText='bottom:8px;left:50%;transform:translateX(-50%);width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)';zone.appendChild(d3)}for(var i=0;i<campUnits.length;i++){var cu=campUnits[i];var el=document.createElement('div');el.className='camp-unit'+(cu.alive?'':' dead');var tc={normal:'#ccc',scarce:'#4ade80',legendary:'#a855f7',mythical:'#f97316'}[cu.tier]||'#ccc';el.style.left=Math.round(cu.x)+'px';el.style.top=Math.round(cu.y)+'px';el.style.borderColor=tc;el.style.background=cu.alive?'rgba(26,26,46,0.8)':'rgba(50,50,50,0.5)';el.style.color=tc;var dn=cu.nm.length>2?cu.nm.slice(0,2):cu.nm;el.textContent=dn;(function(unit){el.addEventListener('click',function(ev){ev.stopPropagation();showCampDetail(unit,ev)})})(cu);zone.appendChild(el)}}
function showCampDetail(cu,ev){var zone=document.getElementById('camp-zone');if(!zone)return;var old=zone.querySelector('.camp-detail');if(old)old.remove();var el=document.createElement('div');el.className='camp-detail';var tc=tierCSS(cu.tier);var x=cu.x+30;var y=cu.y-10;if(x+140>(zone.clientWidth||400))x=cu.x-140;if(y<0)y=10;el.style.left=x+'px';el.style.top=y+'px';el.innerHTML='<div style="color:'+tc+';font-family:var(--font-brush);font-size:.9rem">'+cu.nm+'</div><div style="color:var(--gold);font-size:.7rem">'+TN[cu.tier]+' '+(TPName[cu.tp]||'')+'</div><div style="color:#aaa">HP:'+cu.hp+'/'+cu.mhp+' 攻:'+cu.at+' 防:'+cu.df+'</div>'+(cu.alive?'':'<div style="color:var(--cinnabar);font-size:.7rem">已阵亡</div>');zone.appendChild(el);if(campDetailTimer)clearTimeout(campDetailTimer);campDetailTimer=setTimeout(function(){var d=zone.querySelector('.camp-detail');if(d)d.remove()},3000)}


function renderBattle(){var el=document.getElementById('view-battle');var canvas=document.getElementById('battle-canvas');canvas.style.display='block';el.innerHTML='';el.appendChild(canvas);var ctrl=document.createElement('div');ctrl.className='battle-controls';ctrl.innerHTML='<span style="color:var(--gold);font-family:var(--font-brush);font-size:.9rem">第'+GS.round+'回合</span><button class="btn btn-sm" onclick="window._ss(1)" id="sp1">×1</button><button class="btn btn-sm" onclick="window._ss(2)" id="sp2">×2</button><button class="btn btn-sm" onclick="window._ss(4)" id="sp4">×4</button><button class="btn btn-sm" onclick="window._tp()" id="pb">暂停</button>';el.appendChild(ctrl);updSpd()}
function updSpd(){var s=GS.bspeed;var ids=['sp1','sp2','sp4'];for(var i=0;i<3;i++){var el=document.getElementById(ids[i]);if(el)el.style.background=[1,2,4][i]===s?'var(--cinnabar)':''}var pb=document.getElementById('pb');if(pb)pb.textContent=GS.bpaused?'继续':'暂停'}
window._ss=function(s){GS.bspeed=s;updSpd()};
window._tp=function(){GS.bpaused=!GS.bpaused;updSpd()};

function renderSettle(br){var el=document.getElementById('view-settle');var isW=br.result==='win';var rt=getRT(GS.round);var gr=0;if(isW){if(rt===RT.BOSS)gr=R.i(300,500);else if(rt===RT.SHOP)gr=R.i(100,150);else if(rt===RT.RELIC)gr=R.i(60,100);else gr=R.i(50,100)}addGold(gr);var artR=null;if(isW&&rt===RT.RELIC){var qr=R.w([{q:'normal',weight:60},{q:'scarce',weight:30},{q:'legendary',weight:10}]);var pool=AD.filter(function(a){return a.q===qr.q});if(pool.length>0)artR=mkArtInst(R.pick(pool))}else if(isW&&R.ch(.05)){var qr=R.w([{q:'normal',weight:70},{q:'scarce',weight:25},{q:'legendary',weight:5}]);var pool=AD.filter(function(a){return a.q===qr.q});if(pool.length>0)artR=mkArtInst(R.pick(pool))}var recs=[];if(isW){for(var i=0;i<3;i++){var d=R.pick(UD);var tr=R.w([{tier:'normal',weight:50},{tier:'scarce',weight:35},{tier:'legendary',weight:15}]);var ti=TO.indexOf(tr.tier);var mi=TO.indexOf(d.min);var ft=TO[Math.max(ti,mi)];var u=mkPU(d.id,ft);if(u)recs.push(u)}}var mvp=null;if(isW&&BE.pu.length>0){var best=null;for(var i=0;i<BE.pu.length;i++){if(BE.pu[i].dd>(best?best.dd:0))best=BE.pu[i]}if(best)mvp=best}var rh='<div class="fade-in scroll-bg" style="max-width:700px;width:90%;text-align:center"><div style="font-family:var(--font-brush);font-size:2rem;color:'+(isW?'var(--tier-scarce)':'var(--cinnabar)')+';margin-bottom:10px">'+(isW?'大获全胜！':'兵败如山倒……')+'</div>';if(isW&&gr>0)rh+='<div style="font-size:1rem;color:var(--gold);margin:8px 0">获得金币：<span class="gold-text" style="font-size:1.3rem">'+gr+'</span></div>';if(artR)rh+='<div style="margin:10px 0"><div style="color:var(--tier-'+artR.q+');font-family:var(--font-brush);font-size:1.1rem">获得法宝：'+artR.nm+'</div><div style="font-size:.8rem;color:#aaa">'+artR.desc+'</div></div>';if(mvp)rh+='<div style="margin:10px 0;padding:8px;background:var(--ink);border-radius:6px"><div style="color:var(--gold);font-family:var(--font-brush)">MVP - 输出之王</div><div style="color:'+tierCSS(mvp.tier)+';font-size:1.1rem">'+mvp.nm+'</div><div style="font-size:.8rem;color:#aaa">造成伤害：'+mvp.dd+'</div></div>';if(recs.length>0)rh+='<div style="margin:15px 0"><div style="color:var(--gold);font-family:var(--font-brush);margin-bottom:8px">招募弟子（选1）</div><div class="settle-rewards">';for(var i=0;i<recs.length;i++){var u=recs[i];var tc=tierCSS(u.tier);rh+='<div class="card" data-rec-idx="'+i+'" style="width:140px;text-align:center;cursor:pointer" onclick="window._rec('+i+')"><div style="color:'+tc+';font-family:var(--font-brush)">'+u.nm+'</div><div style="font-size:.7rem;color:var(--gold)">'+TN[u.tier]+'</div><div style="font-size:.65rem;color:#aaa">HP:'+u.hp+' 攻:'+u.at+'</div></div>'}if(recs.length>0)rh+='</div></div>';rh+='<div style="margin-top:20px"><button class="btn" onclick="window._nextRound()">继续前行</button>';if(recs.length>0)rh+='<button class="btn btn-sm" id="rec-skip-btn" style="margin-left:10px;display:none" onclick="window._skipRec()">放弃招募</button>';rh+='</div></div>';el.innerHTML=rh;if(artR)GS.arts.push(artR);window._settleRecs=recs;window._recChosen=false;window._showRecSkip=false}
window._rec=function(idx){if(window._recChosen)return;var recs=window._settleRecs||[];if(idx>=0&&idx<recs.length){if(GS.units.length<GC.UNIT_CAP){GS.units.push(recs[idx]);showToast('获得：'+recs[idx].nm);window._recChosen=true;document.querySelectorAll('[data-rec-idx]').forEach(function(c){var ci=parseInt(c.dataset.recIdx);if(ci!==idx){c.style.opacity='.3';c.style.pointerEvents='none'}else{c.style.borderColor='var(--tier-scarce)';c.style.boxShadow='0 0 10px rgba(74,222,128,.5)'}})}else{showToast('队伍已满，无法招募！可选择放弃');window._showRecSkip=true;var skipBtn=document.getElementById('rec-skip-btn');if(skipBtn)skipBtn.style.display='inline-block'}}};window._skipRec=function(){window._recChosen=true;showToast('放弃招募');document.querySelectorAll('[data-rec-idx]').forEach(function(c){c.style.opacity='.3';c.style.pointerEvents='none'})};
window._nextRound=function(){var rt=getRT(GS.round);GS.round++;processRevives();if(rt===RT.SHOP){switchView('shop');renderShop()}else{switchView('prepare');renderPrepare()}};

var shopItems=[];
function renderShop(){shopItems=genShop();var el=document.getElementById('view-shop');var h='<div class="fade-in" style="max-width:900px;width:95%;text-align:center"><div style="font-family:var(--font-brush);font-size:1.8rem;color:var(--gold);margin-bottom:6px">灵石商铺</div><div style="display:flex;justify-content:space-between;margin-bottom:15px;font-size:.9rem"><span class="gold-text">金币：'+GS.gold+'</span><button class="btn btn-sm" onclick="window._sr()" '+(GS.gold<GC.SHOP_REFRESH?'disabled':'')+'>重新进货 ('+GC.SHOP_REFRESH+'金)</button></div><div class="shop-items">';for(var i=0;i<shopItems.length;i++){var it=shopItems[i];if(it.tp==='unit'){var d=it.data;var tc=tierCSS(it.tier);h+='<div class="card" style="text-align:center"><div style="color:'+tc+';font-family:var(--font-brush);font-size:1rem">'+d.nm+'</div><div style="font-size:.75rem;color:var(--gold)">'+TN[it.tier]+' '+(TPName[d.tp]||'')+'</div><div style="font-size:.75rem;color:var(--gold);margin-top:6px">'+it.price+'金</div><button class="btn btn-sm" style="margin-top:6px" onclick="window._buy('+i+')" '+(GS.gold<it.price||GS.units.length>=GC.UNIT_CAP?'disabled':'')+'>购买</button></div>'}else{var a=it.data;var qc={normal:'var(--tier-normal)',scarce:'var(--tier-scarce)',legendary:'var(--tier-legendary)',mythical:'var(--tier-mythical)'}[a.q]||'var(--tier-normal)';h+='<div class="card" style="text-align:center"><div style="color:'+qc+';font-family:var(--font-brush);font-size:.95rem">'+a.nm+'</div><div style="font-size:.7rem;color:#aaa;margin-top:2px">'+a.desc+'</div><div style="font-size:.75rem;color:var(--gold);margin-top:6px">'+it.price+'金</div><button class="btn btn-sm" style="margin-top:6px" onclick="window._buy('+i+')" '+(GS.gold<it.price?'disabled':'')+'>购买</button></div>'}}h+='</div><div style="margin-top:20px"><button class="btn" onclick="window._sl()">告别商人</button></div></div>';el.innerHTML=h}
window._sr=function(){if(GS.gold<GC.SHOP_REFRESH){showToast('囊中羞涩');return}addGold(-GC.SHOP_REFRESH);renderShop()};
window._buy=function(idx){if(idx<0||idx>=shopItems.length)return;var it=shopItems[idx];if(GS.gold<it.price){showToast('囊中羞涩');return}addGold(-it.price);if(it.tp==='unit'){if(GS.units.length>=GC.UNIT_CAP){showToast('队伍已满');return}var u=mkPU(it.data.id,it.tier);if(u)GS.units.push(u);showToast('获得：'+it.data.nm)}else{var a=mkArtInst(it.data);GS.arts.push(a);showToast('获得法宝：'+it.data.nm)}shopItems.splice(idx,1);renderShop()};
window._sl=function(){switchView('prepare');renderPrepare()};

window._sb=function(){if(campAF){cancelAnimationFrame(campAF);campAF=null}var enemies=genEnemies(GS.round);if(GS.units.filter(function(u){return u.alive}).length===0){showToast('没有可出战弟子');return}BE.init(GS.units,enemies);switchView('battle');renderBattle();BE.start();GS.bspeed=1;GS.bpaused=false};

EventBus.on(GameEvent.BATTLE_END,function(br){BE.stop();for(var i=0;i<BE.pu.length;i++){var bu=BE.pu[i];for(var j=0;j<GS.units.length;j++){if(GS.units[j].uid===bu.uid){GS.units[j].hp=bu.hp;GS.units[j].alive=bu.alive;if(!bu.alive){GS.units[j].rcd=GC.REVIVE_TURNS;GS.dead.push(GS.units[j])}break}}}if(br.result==='lose'){for(var i=0;i<GS.units.length;i++)if(!GS.units[i].alive&&GS.units[i].rcd<0){GS.units[i].rcd=GC.REVIVE_TURNS;GS.dead.push(GS.units[i])}}switchView('settle');renderSettle(br)});

window._gs=function(){gsReset();switchView('start');renderStart()};

renderMain();
})();

</script>
